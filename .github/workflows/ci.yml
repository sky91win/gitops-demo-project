name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/gitops-demo:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USERNAME }}/gitops-demo:latest \
            app

      - name: Push Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/gitops-demo:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/gitops-demo:latest